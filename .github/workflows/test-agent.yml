name: Run Unit Test Agent on Demo Project

on:
  push:
    branches: [ "test" ]
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the target repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Pull and run the Unit Test Agent from GHCR
      - name: Run Agent inside Docker container
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # Convert github.repository_owner to lowercase for docker compatibility
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          docker run --rm \
            -v ${{ github.workspace }}/demo_project:/app/demo_project \
            -e OPENROUTER_API_KEY=$OPENROUTER_API_KEY \
            ghcr.io/$OWNER_LC/90covunitest:latest \
            python main.py --repo demo_project

      # 3. Upload Generated Tests and Reports as Workflow Artifacts
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-project-results
          path: |
            demo_project/generated_tests/
            demo_project/coverage_report.json
            demo_project/test_plan.json
