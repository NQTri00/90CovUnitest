name: Build and Test Agent

on:
  push:
    branches: [ "test" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Build the Docker image of the agent
      - name: Build Docker Image
        run: |
          docker build -t 90covunitest:latest ./90CovUnitest

      # 3. Run the Unit Test Agent on the demo_project inside Docker
      - name: Run Agent on demo_project
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/90CovUnitest/demo_project:/app/demo_project \
            -e OPENROUTER_API_KEY=$OPENROUTER_API_KEY \
            90covunitest:latest \
            python main.py --repo demo_project

      # 4. Upload Generated Tests and Reports as Workflow Artifacts
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-project-results
          path: |
            90CovUnitest/demo_project/generated_tests/
            90CovUnitest/demo_project/coverage_report.json
            90CovUnitest/demo_project/test_plan.json
