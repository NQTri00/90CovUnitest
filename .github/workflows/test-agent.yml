name: Run Unit Test Agent on Demo Project

on:
  push:
    branches: [ "test" ]
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the target repository (demo project)
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Checkout the Unit Test Agent source code from its own repo
      - name: Checkout Unit Test Agent
        uses: actions/checkout@v4
        with:
          repository: NQTri00/90CovUnitest
          path: agent-source

      # 3. Build the Docker image from agent source
      - name: Build Agent Docker Image
        run: docker build -t 90covunitest:latest ./agent-source

      # 4. Run the agent on demo_project
      - name: Run Agent on demo_project
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/demo_project:/workspace \
            -e OPENROUTER_API_KEY=$OPENROUTER_API_KEY \
            90covunitest:latest \
            python main.py --repo /workspace

      # 5. Upload Generated Tests and Reports
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-project-results
          path: |
            demo_project/generated_tests/
            demo_project/coverage_report.json
            demo_project/test_plan.json
